name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Test, build, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application bundles
        run: npm run build

      - name: Run lint
        run: npm run lint

  windows-package:
    name: Windows package
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build Windows installer and update artifacts
        run: npm run build:app

      - name: Verify Windows package artifacts
        run: npm run verify:package:win

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-windows-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: |
            dist_electron/LifeOS Setup *.exe
            dist_electron/LifeOS Setup *.exe.blockmap
            dist_electron/LifeOS-*-win.zip
            dist_electron/latest.yml
